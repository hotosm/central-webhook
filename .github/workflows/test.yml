name: 🧪 Test

on:
  push:
    branches: [main]
  # Run tests on PR, prior to merge to main & development
  pull_request:
    branches: [main]
  # Allow manual trigger (workflow_dispatch)
  workflow_dispatch:

jobs:
  tests:
    uses: hotosm/gh-workflows/.github/workflows/test_compose.yml@3.6.0
    with:
      image_name: ghcr.io/${{ github.repository }}
      build_target: build
      tag_override: ci
      compose_file: compose.yml
      compose_service: webhook
